<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>404 - 迷失在异世界了</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: transparent; 
        }
        .bg-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -999;
            background-color: #1a1a1a;
        }
        #anime-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0; 
            display: block;
            transition: opacity 1s ease-in;
            background: #1a1a1a;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.5));
        }
        .content {
            position: relative;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 900;
            letter-spacing: -5px;
            margin-bottom: -10px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: floating 3s ease-in-out infinite;
        }
        .msg {
            font-size: 1.5rem;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: opacity 0.4s;
        }
        .btn-group {
            display: flex;
            gap: 15px;
        }
        .btn {
            text-decoration: none;
            color: #fff;
            padding: 12px 35px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255, 255, 255, 0.1);
        }
        .btn:hover {
            background: #fff;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @media (max-width: 600px) {
            .msg { font-size: 1.1rem; }
            .btn-group { flex-direction: column; }
        }
        /* ------ 魔法阵特效 ------- */
        :root {
            --magic-color: #d1a3ff;
            --magic-glow: 0 0 25px rgba(186, 104, 200, 0.8);
        }
        .magic-container {
            position: fixed;
            right: 70px;
            bottom: 70px;
            width: 100px;
            height: 100px;
            z-index: 2000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .magic-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.6);
            border-radius: 50%;
            transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            pointer-events: none;
        }
        .circle-outermost {
            width: 360%;
            height: 360%;
            border: 1px solid rgba(186, 104, 200, 0.1);
        }
        .circle-outermost::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 2deg, rgba(186, 104, 200, 0.3) 2deg 3deg);
            mask: radial-gradient(transparent 68%, black 70%);
            -webkit-mask: radial-gradient(transparent 68%, black 70%);
        }
        .circle-rune {
            width: 260%;
            height: 260%;
            border: 1px double rgba(255,255,255,0.1);
        }
        .circle-rune::after {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 5deg, rgba(255,255,255,0.2) 5deg 7deg);
            mask: radial-gradient(transparent 60%, black 62%);
            -webkit-mask: radial-gradient(transparent 60%, black 62%);
        }
        .circle-geometry {
            width: 190%;
            height: 190%;
        }
        .shape-square {
            position: absolute;
            inset: 15%;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .shape-square.rotate { transform: rotate(45deg); }
        .circle-main {
            width: 100%;
            height: 100%;
            opacity: 0.8;
            border: 2px solid rgba(255,255,255,0.4);
            transform: translate(-50%, -50%) scale(1);
            animation: circle-rotate 25s linear infinite;
        }
        .magic-svg-core {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 10;
            opacity: 0.2;
            transition: 0.6s;
        }
        .magic-svg-core svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: rgba(255,255,255,0.5);
            stroke-width: 1.5;
        }
        .magic-container:hover .magic-circle {
            opacity: 1; 
            transform: translate(-50%, -50%) scale(1); 
        }
        .magic-container:hover .circle-outermost { 
            border-color: rgba(186,104,200,0.4); 
            animation: circle-rotate 40s linear infinite; 
        }
        .magic-container:hover .circle-rune { 
            border-color: var(--magic-color); 
            box-shadow: var(--magic-glow); 
            animation: circle-rotate-reverse 20s linear infinite; 
        }
        .magic-container:hover .circle-geometry { 
            animation: circle-rotate 15s linear infinite; 
        }
        .magic-container:hover .shape-square { 
            border-color: var(--magic-color); 
        }
        .magic-container:hover .circle-main { 
            border-color: var(--magic-color); 
            box-shadow: var(--magic-glow),inset 0 0 15px rgba(186,104,200,0.3);
        }
        .magic-container:hover .magic-svg-core { 
            opacity: 1; 
            transform: scale(1.1);
        }
        .magic-container:hover .magic-svg-core svg { 
            stroke: var(--magic-color); 
            filter: drop-shadow(0 0 8px var(--magic-color)); 
        }
        .magic-loading .circle-main,
        .magic-loading .circle-rune { animation-duration: 0.5s !important; }
        @keyframes circle-rotate {
            from { transform: translate(-50%, -50%) rotate(0deg);}
            to { transform: translate(-50%, -50%) rotate(360deg);}
        }
        @keyframes circle-rotate-reverse {
            from { transform: translate(-50%, -50%) rotate(360deg);}
            to { transform: translate(-50%, -50%) rotate(0deg);}
        }
    </style>
</head>
<body>
    <div class="bg-box">
        <img id="anime-bg" src="https://acgapi.dpdns.org" onload="showImage(this)">
    </div>
    <div class="overlay"></div>
    <div class="content">
        <h1 class="error-code">404</h1>
        <p class="msg" id="msg-display">正在扫描异世界坐标...</p>
        <div class="btn-group">
            <a href="/" class="btn">次元跳跃</a>
            <a href="javascript:history.back()" class="btn">回退时空</a>
        </div>
    </div>
    <div class="magic-container" id="magic-trigger">
        <div class="magic-circle circle-outermost"></div>
        <div class="magic-circle circle-rune"></div>
        <div class="magic-circle circle-geometry">
            <div class="shape-square"></div>
            <div class="shape-square rotate"></div>
        </div>
        <div class="magic-circle circle-main"></div>
        <div class="magic-svg-core">
            <svg viewBox="0 0 100 100">
                <path d="M50 2 L93 75 L7 75 Z" />
                <path d="M50 98 L7 25 L93 25 Z" />
            </svg>
        </div>
    </div>
    <script>
        (function() {
            console.log(
                ` %c 魔力注入 %c MarioHY `,
                'background: #ba68c8; padding: 1px 4px; border-radius: 3px 0 0 3px; color: #fff; font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.5);',
                'background: #1a1a1a; padding: 1px 4px; border-radius: 0 3px 3px 0; color: #d1a3ff; border: 1px solid #ba68c8;'
            );
            console.log('%c(ﾉ>ω<)ﾉ ⚙️ 狂风臣服，万物逆转！', 'color: #ba68c8; font-family: serif;');
            console.log('%cΔ 迷途的灵魂啊，在此献上你的魔力，随咱一同开启通往新世界的大门！', 'color: #ba68c8; font-family: serif;');
        })();
        const catQuotes = [
            "正在注入魔力，重置因果律喵！", // [0]切换加载专用
            "呜哇！空间节点刚刚打了个盹，传送门就溜走了喵…(｡>ㅅ<｡)",
            "哎嘿？也许页面变成了猫薄荷小鱼干跑掉了喵~主人愿意和我玩会儿嘛？(ゝω・)´",
            "喵呜！异世界的裂缝正悄悄张开，记得抓住咱的小尾巴不要迷路喵 (っ °Д °;)っ",
            "明明很努力守着页面，结果还是不小心让它溜走了喵…咱是不是太没用了 ( >﹏< )",
            "糟糕！刚才咱踩到传送阵电源线，页面好像瞬间断掉了喵……(ฅ´ω`ฅ)",
            "主人你不要用那种失望的眼神看咱啦，咱一定努力把页面召回来喵！( >д<)",
            "魔法阵魔力快用光了，页面还在异世界迷路中喵…请多等一小会儿 (つ﹏⊂)",
            "咦？这是未发现的次元入口，可能需要再试一次喵！~"
        ];
        const LOADING_INDEX = 0;

        const els = {
            bg: document.getElementById('anime-bg'),
            msg: document.getElementById('msg-display'),
            trigger: document.getElementById('magic-trigger')
        };

        function showImage(el){
            el.style.opacity = "1";
        }

        let isSwitching = false;
        function preloadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = url;
                img.onload = () => resolve(url);
                img.onerror = reject;
            });
        }
        async function performSwitch() {
            if (isSwitching) return;
            isSwitching = true;

            els.trigger.classList.add('magic-loading');
            els.msg.style.opacity = '0.5';
            els.msg.innerText = catQuotes[LOADING_INDEX];

            const newImgUrl = `https://acgapi.dpdns.org?t=${Date.now()}`;
            try {
                await preloadImage(newImgUrl);
                els.bg.style.opacity = '0';
                await new Promise(r => setTimeout(r, 600));
                els.bg.src = newImgUrl;
                let quoteIdx;
                if (catQuotes.length > 1) {
                    do {
                        quoteIdx = Math.floor(Math.random() * catQuotes.length);
                    } while (quoteIdx === LOADING_INDEX);
                } else {
                    quoteIdx = LOADING_INDEX;
                }
                els.msg.innerText = catQuotes[quoteIdx];

                setTimeout(()=>{ els.bg.style.opacity = '1'; }, 40);
                els.msg.style.opacity = '1';
            } catch (e) {
                els.msg.innerText = "魔力回路断裂，传送失败了喵！";
                els.msg.style.opacity = '1';
            } finally {
                els.trigger.classList.remove('magic-loading');
                isSwitching = false;
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            let idx = Math.floor(Math.random() * (catQuotes.length - 1)) + 1;
            els.msg.innerText = catQuotes[idx];
            els.trigger.addEventListener('click', performSwitch);
        });
    </script>
</body>
</html>
